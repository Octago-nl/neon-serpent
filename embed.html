<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Serpent — Octagonal (embed)</title>
<style>
  html,body{margin:0;height:100%;background:#070225;color:#e9e6ff;font-family:ui-monospace,monospace;overflow:hidden}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:8px}
  .stage{position:relative;width:min(94vw,94vh);aspect-ratio:1/1;border:2px solid rgba(32,230,255,.35);border-radius:10px;overflow:hidden;box-shadow:0 0 20px rgba(255,47,185,.25)}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  .ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(7,2,37,.7)}
  .b{cursor:pointer;border:0;border-radius:8px;padding:9px 14px;font:inherit;font-weight:700;color:#0b0420;background:#3af0ff}
  a{color:#20e6ff;text-decoration:none;font-size:11px}
  .bar{display:flex;gap:10px;font-size:11px;color:#8f86c9}
</style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <canvas id="game" width="480" height="480"></canvas>
      <div class="overlay ov" id="overlay">
        <button class="b" id="start">▶ PLAY NEON SERPENT</button>
      </div>
    </div>
    <div class="bar">
      <span>SCORE <b id="score">0</b></span>
      <a href="https://octago.nl/neon-serpent" target="_blank" rel="noopener" id="backlink">Made with ⯃ Octagonal ↗</a>
    </div>
  </div>
  <!-- hidden HUD targets the shared game.js expects -->
  <div style="display:none"><span id="best">0</span><span id="len">3</span><span id="title"></span>
    <span id="tag"></span><span id="share-wrap"></span><button id="share"></button>
    <span data-slot="cabinet_banner"></span><a data-slot="insert_coin_jar"></a><span data-slot="arcade_pass_gate"></span></div>
<script>
  window.OCTAGO_COLLECTOR = ""; window.OCTAGO_SLUG = "neon-serpent";
</script>
<script src="https://octago-nl.github.io/beacon.js" crossorigin="anonymous" onerror="1"></script>
<script src="https://octago-nl.github.io/engine.js" crossorigin="anonymous" onerror="1"></script>
<script>
  // embed_load feeds ACQUISITION embed_pings/installs; every embed recirculates into the meta-layer.
  try { window.OCTAGO_BEACON && window.OCTAGO_BEACON.emit("embed_load", { entity: "neon-serpent", value: 1, unit: "count", dims: { referrer: document.referrer } }); } catch (e) {}
</script>
<script src="./game.js"></script>
</body>
</html>
